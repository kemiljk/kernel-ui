version: 2
updates:
  # Bun workspaces: use the bun ecosystem so Dependabot updates bun.lock
  # alongside package.json. The npm ecosystem only bumps manifests and
  # breaks CI's `bun install --frozen-lockfile` step.
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      production-dependencies:
        dependency-type: production
      # Bun only supports dependency-type production|runtime in groups, not
      # development — match dev tools by name instead.
      dev-dependencies:
        patterns:
          - "@types/*"
          - "@astrojs/*"
          - "@vitejs/*"
          - "typescript"
          - "vitest"
          - "vite*"
          - "jsdom"
    ignore:
      # Major dev-tool bumps need a deliberate upgrade pass.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "jsdom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite-plugin-dts"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
