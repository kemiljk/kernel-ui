name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Production deploys are handled by Vercel (see vercel.json). This workflow
# only verifies code quality. Docs are built here on pull requests so merges
# are validated without duplicating the production build Vercel runs on push.

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run --filter '@kernelui-lib/*' build

      - name: Typecheck packages
        run: bun run --filter '@kernelui-lib/*' typecheck

      - name: Test React package
        run: bun run --cwd packages/react test

      - name: Typecheck docs
        run: bun run --cwd apps/docs typecheck

      - name: Build docs
        if: github.event_name == 'pull_request'
        run: bun run docs:build
